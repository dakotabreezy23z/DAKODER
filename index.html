<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="PyLearn">
  <meta name="theme-color" content="#0a0e1a">
  <title>DAKODER 🐍</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    :root{
      --bg:#0a0e1a; --s1:#111827; --s2:#0f172a; --s3:#0d1117;
      --bd:#1e293b; --t1:#e2e8f0; --t2:#cbd5e1; --tm:#64748b; --ts:#475569;
      --g:#00ff88; --b:#06b6d4; --r:#ef4444; --y:#fbbf24; --o:#f97316;
      --font:'Courier New',monospace;
    }
    html,body{height:100%;overflow-x:hidden}
    body{font-family:var(--font);background:var(--bg);color:var(--t1);max-width:480px;margin:0 auto;
      padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom)}
    h1{font-size:26px;font-weight:900;line-height:1.2}
    h2{font-size:17px;font-weight:800}
    p{font-size:14px;line-height:1.75;color:var(--t2)}
    strong{color:var(--t1)}
    a{color:var(--b);text-decoration:none}

    /* ── LAYOUT ── */
    .pad{padding:20px}
    .pad-sm{padding:12px 20px}
    .stack{display:flex;flex-direction:column;gap:12px}
    .row{display:flex;align-items:center;gap:10px}
    .grow{flex:1}

    /* ── NAVBAR ── */
    .nav{position:sticky;top:0;z-index:99;background:var(--bg);
      border-bottom:1px solid var(--bd);padding:14px 20px;
      display:flex;align-items:center;gap:12px}
    .back{background:none;border:none;color:var(--tm);font-size:22px;
      cursor:pointer;padding:0;font-family:var(--font);line-height:1}

    /* ── BUTTONS ── */
    .btn{width:100%;border:none;border-radius:14px;padding:15px;font-size:15px;
      font-weight:800;cursor:pointer;font-family:var(--font);transition:opacity .15s}
    .btn-g{background:linear-gradient(135deg,var(--g),var(--b));color:#000}
    .btn-g:disabled{background:var(--s1);color:var(--ts);cursor:not-allowed}
    .btn-outline{background:var(--s1);border:1px solid var(--bd);color:var(--t2)}
    .btn-sm{width:auto;padding:9px 16px;font-size:12px;border-radius:10px}

    /* ── CARDS ── */
    .card{background:var(--s1);border:1px solid var(--bd);border-radius:14px;padding:16px}
    .card-green{background:linear-gradient(135deg,#052e16,#064e3b);border-color:#00ff8833}
    .card-blue{background:#0d1a2d;border:1px solid #1e3a5f}
    .card-red{background:#1c0a0a;border-color:#ef444444}
    .card-yellow{background:#1c1208;border-color:#f5940044}

    /* ── TAGS / BADGES ── */
    .tag{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--ts)}
    .badge-g{background:rgba(0,255,136,.1);color:var(--g);border-radius:8px;padding:4px 10px;font-size:11px;font-weight:700}
    .badge-b{background:rgba(6,182,212,.1);color:var(--b);border-radius:8px;padding:4px 10px;font-size:11px;font-weight:700}

    /* ── PROGRESS BAR ── */
    .prog-track{background:var(--bd);border-radius:99px;height:6px}
    .prog-fill{background:linear-gradient(90deg,var(--g),var(--b));border-radius:99px;height:6px;transition:width .6s}

    /* ── CODE BLOCKS ── */
    .cblock{border-radius:12px;overflow:hidden;margin:14px 0}
    .cblock-head{background:var(--s2);border:1px solid var(--bd);border-bottom:none;
      padding:7px 14px;display:flex;align-items:center;justify-content:space-between}
    .cblock-code{background:var(--s3);border:1px solid var(--bd);padding:12px 14px}
    .cblock-out{background:#020617;border:1px solid var(--bd);border-top:1px solid #0d2040;padding:10px 14px}
    .cblock-code pre,.cblock-out pre{font-family:var(--font);font-size:13px;line-height:1.75;
      white-space:pre-wrap;word-break:break-word;margin:0}
    .cblock-out pre{color:#a3e635}

    /* ── STEP DOTS ── */
    .dots{display:flex;gap:6px;justify-content:center;margin-bottom:4px}
    .dot{width:7px;height:7px;border-radius:50%;background:var(--bd)}
    .dot.on{background:var(--g)}
    .dot.done{background:var(--b)}

    /* ── QUIZ OPTIONS ── */
    .qopt{width:100%;background:var(--s1);border:1px solid var(--bd);border-radius:12px;
      padding:13px 16px;text-align:left;font-size:13px;color:var(--t2);
      cursor:pointer;display:flex;align-items:flex-start;gap:10px;
      font-family:var(--font);transition:all .15s;line-height:1.5}
    .qopt.sel{background:#1e293b;border-color:var(--b);color:var(--b)}
    .qopt.ok{background:#052e16;border-color:var(--g);color:var(--g)}
    .qopt.bad{background:#1c0a0a;border-color:var(--r);color:var(--r)}
    .qletter{min-width:22px;height:22px;border-radius:6px;background:var(--bd);
      display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--ts);flex-shrink:0;margin-top:1px}

    /* ── CODE EDITOR ── */
    .editor{width:100%;min-height:130px;background:var(--s3);border:1px solid var(--bd);
      border-radius:12px;padding:14px;font-family:var(--font);font-size:13px;
      color:#7dd3fc;line-height:1.75;resize:vertical;outline:none;-webkit-appearance:none;
      caret-color:var(--g)}
    .editor:focus{border-color:var(--b)}

    /* ── FEEDBACK ── */
    .feedback{border-radius:12px;padding:14px;margin:12px 0;font-size:13px;line-height:1.7}
    .feedback strong{font-size:15px;display:block;margin-bottom:6px}

    /* ── SPINNER ── */
    .spin{width:18px;height:18px;border:2px solid var(--bd);border-top-color:var(--g);
      border-radius:50%;animation:sp .7s linear infinite;display:inline-block;vertical-align:middle}
    @keyframes sp{to{transform:rotate(360deg)}}

    /* ── HOME LESSON CARDS ── */
    .lcard{background:var(--s1);border:1px solid var(--bd);border-radius:14px;
      padding:14px 16px;display:flex;align-items:center;gap:14px;cursor:pointer;
      transition:transform .12s;text-align:left;width:100%}
    .lcard:active{transform:scale(.97)}
    .lcard.done{background:linear-gradient(135deg,#052e16,#064e3b);border-color:#00ff8833}
    .lcard.locked{opacity:.4;cursor:not-allowed}
    .licon{width:46px;height:46px;border-radius:12px;background:var(--bd);
      display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}

    /* ── SECTION DIVIDER ── */
    .sdiv{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--g);
      display:flex;align-items:center;gap:8px;margin:20px 0 12px}
    .sdiv::after{content:'';flex:1;height:1px;background:#00ff8820}

    /* ── API KEY SETUP ── */
    .api-input{width:100%;background:var(--s3);border:1px solid var(--bd);border-radius:12px;
      padding:12px 14px;font-family:var(--font);font-size:13px;color:var(--t1);
      outline:none;-webkit-appearance:none}
    .api-input:focus{border-color:var(--b)}

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar{width:0}

    /* ── HINT ── */
    .hint{background:#0f1a2e;border:1px solid #1e3a5f;border-radius:10px;
      padding:12px;font-size:12px;color:#7dd3fc;display:none}
    .hint.shown{display:block}

    /* ── MISC ── */
    .sep{height:1px;background:var(--bd);margin:16px 0}
    .center{text-align:center}
    .muted{color:var(--tm);font-size:12px}
    .green{color:var(--g)} .blue{color:var(--b)} .red{color:var(--r)} .yellow{color:var(--y)}
    .mb8{margin-bottom:8px} .mb12{margin-bottom:12px} .mb16{margin-bottom:16px} .mb20{margin-bottom:20px}
    .mt8{margin-top:8px} .mt12{margin-top:12px} .mt16{margin-top:16px}
  </style>
</head>
<body>
<div id="app"></div>
<script>
// ─────────────────────────────────────────────
//  LESSONS DATA
// ─────────────────────────────────────────────
const LESSONS = [
  {
    id:0, emoji:"👋", title:"Hello, World!", concept:"Printing Output",
    content:[
      {type:"text",text:"Every coder's first step is making the computer say something. In Python you use the <strong>print()</strong> function. Whatever you put inside the parentheses (in quotes) gets displayed on screen."},
      {type:"code",code:`print("Hello, World!")\nprint("I'm learning Python!")\nprint("This is awesome 🔥")`,out:`Hello, World!\nI'm learning Python!\nThis is awesome 🔥`},
      {type:"text",text:"The text inside quotes is called a <strong>string</strong>. You can use single or double quotes — both work. You can print as many lines as you want, just call print() again."},
      {type:"code",code:`print('Single quotes work too!')\nprint("So do double quotes")`,out:`Single quotes work too!\nSo do double quotes`},
      {type:"text",text:"You can also print numbers directly — no quotes needed for those."},
      {type:"code",code:`print(42)\nprint(3.14)`,out:`42\n3.14`},
    ],
    quizzes:[
      {q:"What will this output?\n\nprint(\"Python rocks\")",opts:["rocks","\"Python rocks\"","Python rocks","Nothing"],ans:2,exp:"print() outputs whatever is inside the parentheses, without the surrounding quotes."},
      {q:"Which line is valid Python?",opts:["Print(\"Hello\")","print \"Hello\"","print(\"Hello\")","echo(\"Hello\")"],ans:2,exp:"print() must be lowercase and the text must be inside parentheses with quotes."},
    ],
    challenge:{
      title:"Your first program",
      desc:"Write 3 print() statements that output:\n1. Your name\n2. Your favorite food\n3. The number 2025",
      hint:"Use print() three times. Text needs quotes, but numbers don't.",
      starter:"# Write your 3 print statements below\n",
      task:"Write 3 print() statements: one for a name (text), one for a food (text), one for the number 2025 (no quotes needed for numbers).",
      expected:"(your name)\n(your fav food)\n2025"
    }
  },
  {
    id:1, emoji:"📦", title:"Variables", concept:"Storing Data",
    content:[
      {type:"text",text:"A <strong>variable</strong> is a named container for storing a value. You create one with a single = sign (called the assignment operator). The name goes on the left, the value on the right."},
      {type:"code",code:`name = "Jordan"\nage = 21\nheight = 5.9\n\nprint(name)\nprint(age)`,out:`Jordan\n21`},
      {type:"text",text:"Variable names can contain letters, numbers, and underscores, but <strong>cannot start with a number</strong>. They're case-sensitive: <strong>name</strong> and <strong>Name</strong> are different variables."},
      {type:"code",code:`# Good names\nmy_name = "Sam"\nfavoriteColor = "blue"\nscore1 = 100\n\n# This would crash:\n# 1score = 100  ← starts with number!`,out:""},
      {type:"text",text:"You can update a variable by reassigning it. The old value is replaced. You can also use a variable inside another expression."},
      {type:"code",code:`score = 50\nprint(score)   # 50\n\nscore = 75     # overwrite it\nprint(score)   # 75\n\nbonus = 10\nfinal = score + bonus\nprint(final)`,out:`50\n75\n85`},
    ],
    quizzes:[
      {q:"How do you store the value 100 in a variable called points?",opts:["100 = points","points == 100","points = 100","var points = 100"],ans:2,exp:"In Python, assignment is name = value. The variable name always goes on the left."},
      {q:"Which is a valid variable name?",opts:["2fast","my-score","first name","player_1"],ans:3,exp:"Variable names can use letters, numbers, and underscores. No spaces, hyphens, or starting with a digit."},
    ],
    challenge:{
      title:"Your profile",
      desc:"Create 3 variables:\n• name — your name as a string\n• age — your age as a number\n• fav_language — set it to \"Python\"\n\nThen print all three.",
      hint:"Use = to assign. Strings need quotes. Numbers don't.",
      starter:"# Create your 3 variables here\n\n# Then print them\n",
      task:"Create variables: name (string), age (integer), fav_language = 'Python'. Then print all three on separate lines.",
      expected:"(your name)\n(your age)\nPython"
    }
  },
  {
    id:2, emoji:"🔢", title:"Numbers & Math", concept:"Operators & Calculations",
    content:[
      {type:"text",text:"Python handles all the math you'd expect, plus a few extras. The basic operators are + - * / and there are two more powerful ones you'll use a lot."},
      {type:"code",code:`print(10 + 3)   # 13  - addition\nprint(10 - 3)   # 7   - subtraction\nprint(10 * 3)   # 30  - multiplication\nprint(10 / 3)   # 3.33 - division\nprint(10 // 3)  # 3   - floor division (no decimal)\nprint(10 % 3)   # 1   - modulo (remainder)\nprint(2 ** 8)   # 256 - power (2 to the 8th)`,out:`13\n7\n30\n3.3333333333333335\n3\n1\n256`},
      {type:"text",text:"Python has two number types: <strong>int</strong> (whole numbers like 5, 100) and <strong>float</strong> (decimals like 3.14, 99.9). Division always returns a float. You can store results in variables."},
      {type:"code",code:`price = 49.99\ntax_rate = 0.08\ntax = price * tax_rate\ntotal = price + tax\n\nprint(total)`,out:`53.9892`},
      {type:"text",text:"Python follows standard <strong>order of operations</strong> (PEMDAS). Use parentheses to control what runs first."},
      {type:"code",code:`print(2 + 3 * 4)    # 14, not 20\nprint((2 + 3) * 4)  # 20`,out:`14\n20`},
    ],
    quizzes:[
      {q:"What does this output?\n\nprint(2 ** 4)",opts:["8","16","24","6"],ans:1,exp:"** means 'to the power of'. 2⁴ = 2×2×2×2 = 16."},
      {q:"What does 17 % 5 return?",opts:["3","2","1","0"],ans:1,exp:"% is modulo — it gives the remainder. 17 ÷ 5 = 3 remainder 2. So 17 % 5 = 2."},
    ],
    challenge:{
      title:"Tip calculator",
      desc:"Calculate a 18% tip on a $64 meal.\n\n• Store the meal price in a variable\n• Calculate the tip (price * 0.18)\n• Print both the tip amount and the total (price + tip)",
      hint:"tip = meal_price * 0.18\ntotal = meal_price + tip",
      starter:"meal_price = 64\n\n# Calculate tip (18%)\n\n# Print tip amount\n\n# Print total\n",
      task:"Given meal_price = 64, calculate tip = meal_price * 0.18 and total = meal_price + tip. Print both tip and total.",
      expected:"11.52\n75.52"
    }
  },
  {
    id:3, emoji:"✂️", title:"Strings", concept:"Text Manipulation",
    content:[
      {type:"text",text:"Strings are how Python handles text. You already know how to print them — now let's do more powerful things with them. Strings have built-in <strong>methods</strong> (functions that belong to the string)."},
      {type:"code",code:`msg = "hello world"\n\nprint(msg.upper())       # all caps\nprint(msg.lower())       # all lowercase\nprint(msg.capitalize())  # First letter cap\nprint(msg.title())       # Every Word Cap\nprint(len(msg))          # number of characters\nprint(msg.replace("world", "Python"))`,out:`HELLO WORLD\nhello world\nHello world\nHello World\n11\nhello Python`},
      {type:"text",text:"<strong>f-strings</strong> (formatted strings) are the best way to mix variables into text. Put an f before the quote, then use curly braces {} around any variable."},
      {type:"code",code:`name = "Alex"\nage = 23\ncity = "NYC"\n\nprint(f"My name is {name}.")\nprint(f"I am {age} years old.")\nprint(f"{name} lives in {city}.")`,out:`My name is Alex.\nI am 23 years old.\nAlex lives in NYC.`},
      {type:"text",text:"You can also do math inside f-string curly braces, and access individual characters using <strong>indexing</strong> (counting starts at 0!)."},
      {type:"code",code:`word = "Python"\nprint(word[0])   # first letter\nprint(word[-1])  # last letter\nprint(word[0:3]) # slice: first 3 chars`,out:`P\nn\nPyt`},
    ],
    quizzes:[
      {q:"What does this output?\n\nprint(\"hello\".upper())",opts:["hello","HELLO","Hello","\"HELLO\""],ans:1,exp:".upper() converts all characters to uppercase."},
      {q:"What does len(\"Python\") return?",opts:["5","6","7","P"],ans:1,exp:"len() counts characters. P-y-t-h-o-n = 6 characters."},
    ],
    challenge:{
      title:"Personal bio",
      desc:"Create variables for your name, age, and city. Then use an f-string to print:\n\n\"Hi! I'm [name], [age] years old, from [city].\"\n\nAlso print your name in ALL CAPS on the next line.",
      hint:"Use f\"...{variable}...\" for the sentence.\nUse name.upper() for the caps version.",
      starter:`name = "Your Name"\nage = 20\ncity = "Your City"\n\n# Print the f-string sentence\n\n# Print name in ALL CAPS\n`,
      task:"Use variables name, age, city in an f-string to print a sentence like \"Hi! I'm [name], [age] years old, from [city].\" Then print name.upper() on the next line.",
      expected:"Hi! I'm [name], [age] years old, from [city].\n[NAME]"
    }
  },
  {
    id:4, emoji:"💬", title:"User Input", concept:"Interactive Programs",
    content:[
      {type:"text",text:"So far your programs have used fixed data. With <strong>input()</strong> you can ask the user to type something. Whatever they type gets stored as a string."},
      {type:"code",code:`name = input("What's your name? ")\nprint(f"Nice to meet you, {name}!")`,out:`What's your name? Jordan\nNice to meet you, Jordan!`},
      {type:"text",text:"<strong>Important:</strong> input() always returns a <strong>string</strong>, even if the user types a number. To use it as a number, you must convert it with <strong>int()</strong> or <strong>float()</strong>."},
      {type:"code",code:`age_str = input("How old are you? ")\nage = int(age_str)         # convert to integer\nnext_year = age + 1\n\nprint(f"Next year you'll be {next_year}!")`,out:`How old are you? 22\nNext year you'll be 23!`},
      {type:"text",text:"You can chain the conversion on one line. Use <strong>float()</strong> if the number might have a decimal point."},
      {type:"code",code:`price = float(input("Enter price: "))\ndiscounted = price * 0.9\nprint(f"10% off: ${discounted:.2f}")`,out:`Enter price: 49.99\n10% off: $44.99`},
    ],
    quizzes:[
      {q:"What type does input() always return?",opts:["int","float","string","number"],ans:2,exp:"input() always returns a string, even if the user types a number. You have to convert it manually."},
      {q:"How do you convert the string \"42\" to an integer?",opts:["string(\"42\")","convert(\"42\")","int(\"42\")","integer(\"42\")"],ans:2,exp:"int() converts a string (or float) to a whole number integer."},
    ],
    challenge:{
      title:"Number doubler",
      desc:"Write a program that:\n1. Asks the user to enter a number\n2. Converts it to a float\n3. Doubles it\n4. Prints: \"Double that is: [result]\"",
      hint:"num = float(input(\"Enter a number: \"))\ndoubled = num * 2",
      starter:`# Ask for a number\n\n# Convert to float and double it\n\n# Print the result\n`,
      task:"Use input() to get a number, convert with float(), multiply by 2, and print 'Double that is: [result]'",
      expected:"Enter a number: 7\nDouble that is: 14.0"
    }
  },
  {
    id:5, emoji:"❓", title:"If / Elif / Else", concept:"Making Decisions",
    content:[
      {type:"text",text:"Your code can make decisions with <strong>if statements</strong>. If the condition is true, one block of code runs. Otherwise, the <strong>else</strong> block runs. <strong>Indentation</strong> (the 4 spaces before the code) tells Python what belongs inside the block."},
      {type:"code",code:`age = 20\n\nif age >= 18:\n    print("You can vote!")\nelse:\n    print("Not old enough yet.")`,out:`You can vote!`},
      {type:"text",text:"Comparison operators: == (equals), != (not equals), > (greater), < (less), >= (greater or equal), <= (less or equal). Use <strong>elif</strong> to add more conditions in the middle."},
      {type:"code",code:`score = 78\n\nif score >= 90:\n    print("A — Excellent!")\nelif score >= 80:\n    print("B — Great job!")\nelif score >= 70:\n    print("C — Not bad.")\nelse:\n    print("Keep studying!")`,out:`C — Not bad.`},
      {type:"text",text:"You can combine conditions with <strong>and</strong> / <strong>or</strong>. Use <strong>not</strong> to flip a condition."},
      {type:"code",code:`temp = 22\nraining = False\n\nif temp > 20 and not raining:\n    print("Perfect day for a walk!")\nelse:\n    print("Maybe stay inside.")`,out:`Perfect day for a walk!`},
    ],
    quizzes:[
      {q:"x = 5\n\nif x > 10:\n    print(\"big\")\nelse:\n    print(\"small\")\n\nWhat prints?",opts:["big","small","big\nsmall","Nothing"],ans:1,exp:"5 is not greater than 10, so Python skips the if block and runs else, printing 'small'."},
      {q:"Which operator checks if two values are EQUAL?",opts:["=","=>","==","!="],ans:2,exp:"== checks equality. A single = is assignment (stores a value). Don't mix them up!"},
    ],
    challenge:{
      title:"Positive, negative, or zero?",
      desc:"Write a program that checks a number and prints:\n• \"Positive\" if > 0\n• \"Negative\" if < 0\n• \"Zero\" if it equals 0\n\nTest it with number = -7",
      hint:"Use if / elif / else with >, <, and == comparisons.",
      starter:`number = -7\n\n# Check and print the result\n`,
      task:"Given number = -7, use if/elif/else to print 'Positive', 'Negative', or 'Zero' based on the value.",
      expected:"Negative"
    }
  },
  {
    id:6, emoji:"📋", title:"Lists", concept:"Storing Collections",
    content:[
      {type:"text",text:"A <strong>list</strong> holds multiple items in one variable. Items are written in square brackets [], separated by commas. Lists can hold strings, numbers, or a mix."},
      {type:"code",code:`fruits = ["apple", "mango", "grape", "banana"]\nnumbers = [10, 25, 3, 99, 7]\nmixed = ["Alice", 22, True, 3.14]\n\nprint(fruits)\nprint(len(fruits))    # number of items`,out:`['apple', 'mango', 'grape', 'banana']\n4`},
      {type:"text",text:"Access items with their <strong>index</strong> (position number). Counting starts at <strong>0</strong>, not 1. Negative indexes count from the end."},
      {type:"code",code:`fruits = ["apple", "mango", "grape"]\n\nprint(fruits[0])   # first item\nprint(fruits[1])   # second item\nprint(fruits[-1])  # last item`,out:`apple\nmango\ngrape`},
      {type:"text",text:"Lists are <strong>mutable</strong> — you can change them. Add items with <strong>.append()</strong>, remove with <strong>.remove()</strong>, sort with <strong>.sort()</strong>."},
      {type:"code",code:`cart = ["shoes", "shirt"]\n\ncart.append("hat")      # add to end\ncart.append("socks")\nprint(cart)\n\ncart.remove("shirt")    # remove item\nprint(cart)\n\ncart.sort()             # alphabetical\nprint(cart)`,out:`['shoes', 'shirt', 'hat', 'socks']\n['shoes', 'hat', 'socks']\n['hat', 'shoes', 'socks']`},
    ],
    quizzes:[
      {q:"items = [\"a\", \"b\", \"c\"]\n\nWhat does items[0] return?",opts:["b","c","a","1"],ans:2,exp:"Lists are zero-indexed. Index 0 is always the first item."},

function isComplete(idx) {
  const p = S.progress[idx];
  return p && p.quizzes && p.quizzes.length === 2 && p.challenge !== undefined;
}

function isUnlocked(idx) {
  return idx === 0 || isComplete(idx - 1);
}

function totalXP() {
  // 10 XP per quiz, 30 XP per challenge (only first time)
  let x = 0;
  for (const [k, p] of Object.entries(S.progress)) {
    if (p.quizzes) p.quizzes.forEach(q => { if (q !== undefined) x += 10; });
    if (p.challenge !== undefined) x += 30;
  }
  return x;
}

function lessonsComplete() {
  return LESSONS.filter((_,i) => isComplete(i)).length;
}

// ─────────────────────────────────────────────
//  SYNTAX HIGHLIGHT
// ─────────────────────────────────────────────
function hl(raw) {
  if (!raw) return "";
  const lines = raw.split("\n");
  return lines.map(line => {
    // Find comment start outside strings
    let inStr = false, sc = "", ci = -1;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (!inStr && (c==='"'||c==="'")) { inStr=true; sc=c; }
      else if (inStr && c===sc) { inStr=false; }
      else if (!inStr && c==="#") { ci=i; break; }
    }
    let code = ci>=0 ? line.slice(0,ci) : line;
    const comment = ci>=0 ? line.slice(ci) : "";

    code = code.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");

    // Protect strings
    const strs = [];
    code = code.replace(/("(?:[^"\\]|\\.)*"|'(?:[^'\\]|\\.)*')/g, m => {
      strs.push(m);
      return `\x01${strs.length-1}\x01`;
    });

    // Keywords
    ["def","return","if","elif","else","for","while","in","and","or","not","break",
     "continue","pass","True","False","None","import","from","class","with","as","try","except",
     "print","input","len","range","int","float","str","append","remove","sort","type","round","abs"
    ].forEach(kw => {
      code = code.replace(new RegExp(`\\b(${kw})\\b`,"g"),
        `<span style="color:#7dd3fc">$1</span>`);
    });

    // Numbers
    code = code.replace(/\b(\d+\.?\d*)\b/g,
      `<span style="color:#f97316">$1</span>`);

    // Restore strings
    strs.forEach((s,i) => {
      code = code.replace(`\x01${i}\x01`,
        `<span style="color:#fbbf24">${s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}</span>`);
    });

    const commentHtml = comment
      ? `<span style="color:#4b5563">${comment.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}</span>`
      : "";

    return code + commentHtml;
  }).join("\n");
}

function escHtml(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

// ─────────────────────────────────────────────
//  CONTENT RENDERER

function renderBlock(b) {
  if (b.type === "text") {
    return `<p class="mb16">${b.text}</p>`;
  }
  if (b.type === "code") {
    const hasOut = b.out && b.out.trim();
    return `<div class="cblock">
      <div class="cblock-head">
        <span class="tag">Python</span>
        <span style="font-size:11px;color:#4b5563">code example</span>
      </div>
      <div class="cblock-code"><pre>${hl(b.code)}</pre></div>
      ${hasOut ? `<div class="cblock-out"><div style="font-size:10px;color:#4b5563;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px">Output</div><pre>${escHtml(b.out)}</pre></div>` : ""}
    </div>`;
  }
  return "";
}

  <div class="nav">
    <button class="back" onclick="go('reading',${S.lessonIdx})">‹</button>
    <div class="grow">
      <div class="tag">Lesson ${S.lessonIdx+1} · Code Challenge</div>
      <div style="font-size:15px;font-weight:700">✍️ ${ch.title}</div>
    </div>
    <span class="badge-g">+30 XP</span>
  </div>

  <div class="pad" style="padding-bottom:80px">
    <!-- Task card -->
    <div class="card card-blue mb16">
      <div class="tag mb8">Your Task</div>
      <div style="font-size:13px;color:#7dd3fc;line-height:1.75;white-space:pre-wrap">${escHtml(ch.desc)}</div>
    </div>

    <!-- Hint -->
    <button class="btn btn-outline btn-sm mb12" onclick="toggleHint()">
      ${S.hintShown?"🙈 Hide Hint":"💡 Show Hint"}
    </button>
    <div class="hint ${S.hintShown?"shown":""}" id="hintBox">
      <div class="tag mb8">Hint</div>
      <pre style="font-family:var(--font);font-size:12px;white-space:pre-wrap;color:#7dd3fc">${escHtml(ch.hint)}</pre>
    </div>

    <!-- Editor -->
    <div class="tag mb8 mt12">Your Code</div>
    <textarea class="editor" id="codeEditor" placeholder="Write your Python here..." oninput="updateCode(this.value)">${escHtml(S.code || ch.starter)}</textarea>

    ${feedbackHtml}

    <!-- Buttons -->
    <div class="stack mt12">
      ${S.checking ?
        `<button class="btn btn-g" disabled><span class="spin"></span>&nbsp; Checking...</button>` :
        `<button class="btn btn-g" onclick="checkCode()">
          ${S.apiKey ? "🤖 Check with Claude" : "👁️ Check My Work"}
        </button>`
      }
      ${done ? `<button class="btn btn-outline" onclick="go('home')">← Back to Lessons</button>` : ""}
      ${S.lessonIdx < LESSONS.length-1 && done ?
        `<button class="btn btn-g" onclick="go('reading',${S.lessonIdx+1})">Next Lesson →</button>` : ""}
    </div>

    <!-- No API key mode: show expected output -->
    ${!S.apiKey ? `<div class="card mt16">
      <div class="tag mb8">Expected Output</div>
      <pre style="font-family:var(--font);font-size:12px;color:#a3e635;white-space:pre-wrap">${escHtml(ch.expected)}</pre>
      <div class="muted mt8">Compare your output to this. Add an API key for AI feedback!</div>
    </div>` : ""}
  </div>`;
}

function renderDone() {
  const xp = totalXP();
  return `<div style="padding:60px 20px;text-align:center">
    <div style="font-size:64px;margin-bottom:16px">🏆</div>
    <h1 style="background:linear-gradient(135deg,#fff,var(--g));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px">
      You did it!
    </h1>
    <p class="mb20">All 10 Python lessons complete. You earned <strong style="color:var(--g)">${xp} XP</strong>.</p>
    <div class="card card-green mb16">
      <div style="font-size:14px;color:#6ee7b7;line-height:1.8">
        You now know:<br>
        print · variables · math · strings<br>
        input · if/elif/else · lists<br>
        for loops · while loops · functions
      </div>
    </div>
    <p class="muted mb20">What's next? Try building a small project — a quiz game, a to-do list, or a number guessing game using everything you learned!</p>
    <button class="btn btn-g" onclick="go('home')">← Back to Home</button>
  </div>`;
}

// ─────────────────────────────────────────────
//  NAVIGATION
// ─────────────────────────────────────────────
function go(screen, lessonIdx, quizIdx) {
  S.screen = screen;
  if (lessonIdx !== undefined) S.lessonIdx = lessonIdx;
  if (quizIdx !== undefined) {
    S.quizIdx = quizIdx;
    S.quizSel = null;
    S.quizDone = false;
  }
  if (screen === "challenge") {
    S.code = LESSONS[S.lessonIdx].challenge.starter;
    S.feedback = null;
    S.hintShown = false;
    S.checking = false;
  }
  render();
  window.scrollTo(0, 0);
}

// ─────────────────────────────────────────────
//  QUIZ LOGIC
// ─────────────────────────────────────────────
function selQuiz(i) {
  if (S.quizDone) return;
  S.quizSel = i;
  render();
}

function submitQuiz() {
  if (S.quizSel === null) return;
  S.quizDone = true;
  const correct = S.quizSel === LESSONS[S.lessonIdx].quizzes[S.quizIdx].ans;

  // Save progress
  if (!S.progress[S.lessonIdx]) S.progress[S.lessonIdx] = {};
  if (!S.progress[S.lessonIdx].quizzes) S.progress[S.lessonIdx].quizzes = [];
  S.progress[S.lessonIdx].quizzes[S.quizIdx] = correct;
  save();
  render();
}

function nextAfterQuiz() {
  if (S.quizIdx === 0) {
    // Go to quiz 2
    S.quizIdx = 1;
    S.quizSel = null;
    S.quizDone = false;
  } else {
    // Go to challenge
    go("challenge", S.lessonIdx);
  }
  render();
  window.scrollTo(0, 0);
}

// ─────────────────────────────────────────────
//  CHALLENGE LOGIC
// ─────────────────────────────────────────────
function updateCode(val) {
  S.code = val;
  S.feedback = null;
}

function toggleHint() {
  S.hintShown = !S.hintShown;
  render();
}

async function checkCode() {
  const code = S.code.trim();
  if (!code || code === LESSONS[S.lessonIdx].challenge.starter.trim()) {
    S.feedback = { type: "error", msg: "Write some code first! The starter comment doesn't count 😄" };
    render();
    return;
  }

  if (!S.apiKey) {
    // No API: just mark as attempted and show expected
    if (!S.progress[S.lessonIdx]) S.progress[S.lessonIdx] = {};
    if (!S.progress[S.lessonIdx].quizzes) S.progress[S.lessonIdx].quizzes = [];
    S.progress[S.lessonIdx].challenge = "attempted";
    save();
    S.feedback = { type: "hint", msg: "Nice try! Compare your code to the expected output below. Add an API key for detailed AI feedback." };
    render();
    return;
  }

  S.checking = true;
  S.feedback = null;
  render();

  const l = LESSONS[S.lessonIdx];
  const ch = l.challenge;

  const systemPrompt = `You are PyLearn, a friendly and encouraging Python tutor for absolute beginners learning just for fun.
Evaluate the student's code for the given challenge. Be SHORT (2-4 sentences). Be warm and encouraging.
Start with exactly one of these emojis on its own line: ✅ (correct/working), 🤔 (close/partial), ❌ (has issues).
Then give your feedback. If there are errors, explain them simply. Give hints but don't write the solution.
Focus only on whether the code would correctly solve the task if run in Python.`; //

  const userMsg = `Task: ${ch.task}\nExpected output: ${ch.expected}\n\nStudent's code:\n\`\`\`python\n${code}\n\`\`\``;

  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": S.apiKey,
        "anthropic-version": "2023-06-01",
        "anthropic-dangerous-direct-browser-access": "true"
      },
      body: JSON.stringify({
        model: "claude-haiku-4-5-20251001",
        max_tokens: 300,
        system: systemPrompt,
        messages: [{ role: "user", content: userMsg }]
      })
    });

    if (!res.ok) {
      const err = await res.json().catch(()=>({}));
      throw new Error(err.error?.message || `API error ${res.status}`);
    }

    const data = await res.json();
    const text = data.content?.[0]?.text || "No response";

    // Detect correctness from emoji
    let type = "hint";
    if (text.includes("✅")) type = "correct";
    else if (text.includes("❌")) type = "error";

    S.feedback = { type, msg: text.replace(/^[✅🤔❌]\s*/,"") };

    if (type === "correct") {
      if (!S.progress[S.lessonIdx]) S.progress[S.lessonIdx] = {};
      if (!S.progress[S.lessonIdx].quizzes) S.progress[S.lessonIdx].quizzes = [];
      S.progress[S.lessonIdx].challenge = "passed";
      save();
    }

  } catch (e) {
    S.feedback = {
      type: "error",
      msg: `Couldn't reach Claude: ${e.message}. Check your API key or try again. You can compare to the expected output manually.`
    };
  }

  S.checking = false;
  render();
}

// ─────────────────────────────────────────────
//  API KEY MODAL
// ─────────────────────────────────────────────
function showApiSetup() {
  document.getElementById("apiModal").style.display = "block";
}

function closeApiModal() {
  document.getElementById("apiModal").style.display = "none";
}

function saveApiKey() {
  const key = document.getElementById("apiKeyInput").value.trim();
  S.apiKey = key;
  save();
  closeApiModal();
  render();
}

// ─────────────────────────────────────────────
//  MAIN RENDER
// ─────────────────────────────────────────────
function render() {
  const app = document.getElementById("app");
  switch(S.screen) {
    case "home":      app.innerHTML = renderHome(); break;
    case "reading":   app.innerHTML = renderReading(); break;
    case "quiz":      app.innerHTML = renderQuiz(); break;
    case "challenge": app.innerHTML = renderChallenge(); break;
    case "done":      app.innerHTML = renderDone(); break;
  }
}

render();
</script>
</body>
</html>
