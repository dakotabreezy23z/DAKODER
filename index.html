<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="DAKODER">
  <meta name="theme-color" content="#0a0e1a">
  <title>DAKODER</title>
  <link rel="icon" type="image/jpeg" href="DAKODER.image.jpg">
  <link rel="apple-touch-icon" href="DAKODER.image.jpg">
  <link rel="manifest" href="manifest.json">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    :root{
      --bg:#0a0e1a; --s1:#111827; --s2:#0f172a; --s3:#0d1117;
      --bd:#1e293b; --t1:#e2e8f0; --t2:#cbd5e1; --tm:#64748b; --ts:#475569;
      --g:#00ff88; --b:#06b6d4; --r:#ef4444; --y:#fbbf24; --o:#f97316;
      --font:'Inter',sans-serif;
      --font-code:'Courier New',monospace;
    }
    html,body{height:100%;overflow-x:hidden}
    body{font-family:var(--font);background:var(--bg);color:var(--t1);max-width:480px;margin:0 auto;
      padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom)}
    h1{font-size:32px;font-weight:800;line-height:1.15;letter-spacing:-0.5px}
    h2{font-size:21px;font-weight:700;letter-spacing:-0.2px}
    p{font-size:16px;line-height:1.75;color:var(--t2)}
    strong{color:var(--t1);font-weight:700}
    a{color:var(--b);text-decoration:none}

    /* ── LAYOUT ── */
    .pad{padding:20px}
    .pad-sm{padding:12px 20px}
    .stack{display:flex;flex-direction:column;gap:12px}
    .row{display:flex;align-items:center;gap:10px}
    .grow{flex:1}

    /* ── NAVBAR ── */
    .nav{position:sticky;top:0;z-index:99;background:var(--bg);
      border-bottom:1px solid var(--bd);padding:14px 20px;
      display:flex;align-items:center;gap:12px}
    .back{background:none;border:none;color:var(--tm);font-size:26px;
      cursor:pointer;padding:0;font-family:var(--font);line-height:1}

    /* ── BUTTONS ── */
    .btn{width:100%;border:none;border-radius:14px;padding:17px;font-size:17px;
      font-weight:700;cursor:pointer;font-family:var(--font);letter-spacing:0px;transition:opacity .15s}
    .btn-g{background:linear-gradient(135deg,var(--g),var(--b));color:#000}
    .btn-g:disabled{background:var(--s1);color:var(--ts);cursor:not-allowed}
    .btn-outline{background:var(--s1);border:1px solid var(--bd);color:var(--t2)}
    .btn-sm{width:auto;padding:10px 18px;font-size:14px;border-radius:10px}

    /* ── CARDS ── */
    .card{background:var(--s1);border:1px solid var(--bd);border-radius:14px;padding:16px}
    .card-green{background:linear-gradient(135deg,#052e16,#064e3b);border-color:#00ff8833}
    .card-blue{background:#0d1a2d;border:1px solid #1e3a5f}
    .card-red{background:#1c0a0a;border-color:#ef444444}
    .card-yellow{background:#1c1208;border-color:#f5940044}

    /* ── TAGS / BADGES ── */
    .tag{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--ts);font-family:var(--font);font-weight:600}
    .badge-g{background:rgba(0,255,136,.1);color:var(--g);border-radius:8px;padding:5px 11px;font-size:12px;font-weight:700;font-family:var(--font)}
    .badge-b{background:rgba(6,182,212,.1);color:var(--b);border-radius:8px;padding:5px 11px;font-size:12px;font-weight:700;font-family:var(--font)}

    /* ── PROGRESS BAR ── */
    .prog-track{background:var(--bd);border-radius:99px;height:6px}
    .prog-fill{background:linear-gradient(90deg,var(--g),var(--b));border-radius:99px;height:6px;transition:width .6s}

    /* ── CODE BLOCKS ── */
    .cblock{border-radius:12px;overflow:hidden;margin:14px 0}
    .cblock-head{background:var(--s2);border:1px solid var(--bd);border-bottom:none;
      padding:7px 14px;display:flex;align-items:center;justify-content:space-between}
    .cblock-code{background:var(--s3);border:1px solid var(--bd);padding:12px 14px}
    .cblock-out{background:#020617;border:1px solid var(--bd);border-top:1px solid #0d2040;padding:10px 14px}
    .cblock-code pre,.cblock-out pre{font-family:var(--font-code);font-size:13px;line-height:1.75;
      white-space:pre-wrap;word-break:break-word;margin:0}
    .cblock-out pre{color:#a3e635}

    /* ── STEP DOTS ── */
    .dots{display:flex;gap:6px;justify-content:center;margin-bottom:4px}
    .dot{width:7px;height:7px;border-radius:50%;background:var(--bd)}
    .dot.on{background:var(--g)}
    .dot.done{background:var(--b)}

    /* ── QUIZ OPTIONS ── */
    .qopt{width:100%;background:var(--s1);border:1px solid var(--bd);border-radius:12px;
      padding:15px 18px;text-align:left;font-size:16px;color:var(--t2);
      cursor:pointer;display:flex;align-items:flex-start;gap:12px;
      font-family:var(--font);transition:all .15s;line-height:1.5}
    .qopt.sel{background:#1e293b;border-color:var(--b);color:var(--b)}
    .qopt.ok{background:#052e16;border-color:var(--g);color:var(--g)}
    .qopt.bad{background:#1c0a0a;border-color:var(--r);color:var(--r)}
    .qletter{min-width:26px;height:26px;border-radius:6px;background:var(--bd);
      display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--ts);flex-shrink:0;margin-top:1px;font-family:var(--font-code)}

    /* ── CODE EDITOR ── */
    .editor{width:100%;min-height:140px;background:var(--s3);border:1px solid var(--bd);
      border-radius:12px;padding:14px;font-family:var(--font-code);font-size:14px;
      color:#7dd3fc;line-height:1.75;resize:vertical;outline:none;-webkit-appearance:none;
      caret-color:var(--g)}
    .editor:focus{border-color:var(--b)}

    /* ── FEEDBACK ── */
    .feedback{border-radius:12px;padding:14px;margin:12px 0;font-size:13px;line-height:1.7}
    .feedback strong{font-size:15px;display:block;margin-bottom:6px}

    /* ── SPINNER ── */
    .spin{width:18px;height:18px;border:2px solid var(--bd);border-top-color:var(--g);
      border-radius:50%;animation:sp .7s linear infinite;display:inline-block;vertical-align:middle}
    @keyframes sp{to{transform:rotate(360deg)}}

    /* ── HOME LESSON CARDS ── */
    .lcard{background:var(--s1);border:1px solid var(--bd);border-radius:14px;
      padding:16px 18px;display:flex;align-items:center;gap:14px;cursor:pointer;
      transition:transform .12s;text-align:left;width:100%;font-family:var(--font)}
    .lcard:active{transform:scale(.97)}
    .lcard.done{background:linear-gradient(135deg,#052e16,#064e3b);border-color:#00ff8833}
    .lcard.locked{opacity:.4;cursor:not-allowed}
    .licon{width:50px;height:50px;border-radius:12px;background:var(--bd);
      display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}

    /* ── SECTION DIVIDER ── */
    .sdiv{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--g);
      display:flex;align-items:center;gap:8px;margin:20px 0 12px}
    .sdiv::after{content:'';flex:1;height:1px;background:#00ff8820}

    /* ── API KEY SETUP ── */
    .api-input{width:100%;background:var(--s3);border:1px solid var(--bd);border-radius:12px;
      padding:14px;font-family:var(--font);font-size:15px;color:var(--t1);
      outline:none;-webkit-appearance:none}
    .api-input:focus{border-color:var(--b)}

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar{width:0}

    /* ── HINT ── */
    .hint{background:#0f1a2e;border:1px solid #1e3a5f;border-radius:10px;
      padding:12px;font-size:12px;color:#7dd3fc;display:none}
    .hint.shown{display:block}

    /* ── MISC ── */
    .sep{height:1px;background:var(--bd);margin:16px 0}
    .center{text-align:center}
    .muted{color:var(--tm);font-size:13px}
    .green{color:var(--g)} .blue{color:var(--b)} .red{color:var(--r)} .yellow{color:var(--y)}
    .mb8{margin-bottom:8px} .mb12{margin-bottom:12px} .mb16{margin-bottom:16px} .mb20{margin-bottom:20px}
    .mt8{margin-top:8px} .mt12{margin-top:12px} .mt16{margin-top:16px}
  </style>
</head>
<body>
<div id="app"></div>
<script>
// ─────────────────────────────────────────────
//  LESSONS DATA
// ─────────────────────────────────────────────
const LESSONS = [
  {
    id:0, emoji:"📖", title:"The Language of Code", concept:"Coding Lingo 101",
    content:[
      {type:"text",text:"Before you write a single line of Python, let's learn how to <strong>read</strong> code. Every symbol means something. Once you know the lingo, nothing will look scary again."},
      {type:"text",text:"<strong>🔵 Syntax</strong> — Coding has strict grammar rules called syntax. One missing quote, one wrong bracket, and your program crashes. That's normal — even pros hit syntax errors daily. The computer is just being picky."},
      {type:"code",code:`print("Hello")   # ✅ correct syntax\nprint("Hello"    # ❌ missing closing ) → crash`,out:``},
      {type:"text",text:"<strong>🟢 Functions</strong> — A function is a named action. You spot one by the word followed by parentheses <strong>()</strong>. Python comes with built-in functions, and you'll make your own later."},
      {type:"code",code:`print()   # "print" is the function name\nlen()     # "len" finds the length of something\ninput()   # "input" asks the user to type something`,out:``},
      {type:"text",text:"<strong>🟡 Arguments</strong> — The stuff you put <em>inside</em> the parentheses is called an argument. You're passing information into the function so it knows what to work with."},
      {type:"code",code:`#       ↓ this whole part is the argument\nprint("Hello, World!")\n#             ↑ the function gets this text and prints it`,out:``},
      {type:"text",text:"<strong>🔴 Strings</strong> — Any text wrapped in quotes is called a string. The quotes are what tell Python 'this is text, not a command'. Forget the quotes and Python gets confused."},
      {type:"code",code:`"Hello"        # string using double quotes\n'Hello'        # string using single quotes — same thing\nHello          # ❌ no quotes → Python thinks it's a variable name`,out:``},
      {type:"text",text:"<strong>🟣 Code Blocks</strong> — A code block is a group of lines that belong together. Python uses <strong>indentation</strong> (4 spaces or 1 tab) to show what's inside a block. You'll use this constantly with loops and if-statements."},
      {type:"code",code:`if it_is_raining:\n    print("Bring an umbrella")   # ← inside the block (indented)\n    print("Wear a jacket")        # ← still inside\nprint("Have a good day")          # ← outside the block (no indent)`,out:``},
      {type:"text",text:"<strong>⚪ Comments</strong> — A line starting with <strong>#</strong> is a comment. Python completely ignores it. Comments are notes you write for yourself (or other humans reading your code)."},
      {type:"code",code:`# This is a comment — Python skips this line\nprint("But Python runs this")   # you can also comment at the end`,out:`But Python runs this`},
      {type:"text",text:"<strong>🟠 Operators</strong> — Symbols that do things. The trickiest ones to know:"},
      {type:"code",code:`=    # ASSIGNMENT — stores a value into a variable\n         # name = "Jordan" means: store "Jordan" in name\n\n==   # EQUALITY CHECK — asks "are these equal?"\n         # name == "Jordan" means: is name equal to "Jordan"?\n\n+    # addition for numbers, joins strings together\n!=   # NOT equal to`,out:``},
      {type:"text",text:"<strong>🔥 Error Messages</strong> — When your code crashes, Python tells you why. Don't panic. The last line of the error is the most useful — it tells you what went wrong and which line caused it."},
      {type:"code",code:`# If you see this:\n# SyntaxError: EOL while scanning string literal\n# It usually means you forgot a closing quote "\n\n# If you see:\n# NameError: name 'hello' is not defined\n# It means Python found a word it doesn't recognize`,out:``},
    ],
    quizzes:[
      {q:"What are the 4 spaces (or tab) before a line of code called?",opts:["A comment","An argument","Indentation","A string"],ans:2,exp:"Indentation is how Python knows which lines belong inside a code block. It's not just style — it's required syntax."},
      {q:"What is the difference between = and == ?",opts:["Nothing, they're the same","= checks equality, == stores a value","= stores a value, == checks equality","== is a typo"],ans:2,exp:"= is assignment (store this value). == is a question (are these equal?). Mixing them up is one of the most common beginner mistakes."},
    ],
    challenge:{
      title:"Decode this code",
      desc:"Look at this snippet and write a comment above each line explaining what it does in plain English:\n\n# Example:\n# This line stores the name Jordan in a variable\nname = \"Jordan\"\nprint(name)\n\nThere's no wrong answer — just show you can read the code!",
      hint:"# line 1: ...\nname = \"Jordan\"\n# line 2: ...\nprint(name)",
      starter:`# Write a comment above each line explaining what it does:\n\nname = "Jordan"\nprint(name)\n`,
      task:"Add a comment above name = 'Jordan' explaining it stores a name, and a comment above print(name) explaining it displays the name.",
      expected:"# stores the name Jordan in a variable\nname = \"Jordan\"\n# prints the value of name to the screen\nprint(name)"
    }
  },
  {
    id:1, emoji:"👋", title:"Hello, World!", concept:"Printing Output",
    content:[
      {type:"text",text:"Every coder's first step is making the computer say something. In Python you use the <strong>print()</strong> function. Whatever you put inside the parentheses (in quotes) gets displayed on screen."},
      {type:"code",code:`print("Hello, World!")\nprint("I'm learning Python!")\nprint("This is awesome 🔥")`,out:`Hello, World!\nI'm learning Python!\nThis is awesome 🔥`},
      {type:"text",text:"The text inside quotes is called a <strong>string</strong>. You can use single or double quotes — both work. You can print as many lines as you want, just call print() again."},
      {type:"code",code:`print('Single quotes work too!')\nprint("So do double quotes")`,out:`Single quotes work too!\nSo do double quotes`},
      {type:"text",text:"You can also print numbers directly — no quotes needed for those."},
      {type:"code",code:`print(42)\nprint(3.14)`,out:`42\n3.14`},
    ],
    quizzes:[
      {q:"What will this output?\n\nprint(\"Python rocks\")",opts:["rocks","\"Python rocks\"","Python rocks","Nothing"],ans:2,exp:"print() outputs whatever is inside the parentheses, without the surrounding quotes."},
      {q:"Which line is valid Python?",opts:["Print(\"Hello\")","print \"Hello\"","print(\"Hello\")","echo(\"Hello\")"],ans:2,exp:"print() must be lowercase and the text must be inside parentheses with quotes."},
    ],
    challenge:{
      title:"Your first program",
      desc:"Write 3 print() statements that output:\n1. Your name\n2. Your favorite food\n3. The number 2025",
      hint:"Use print() three times. Text needs quotes, but numbers don't.",
      starter:"# Write your 3 print statements below\n",
      task:"Write 3 print() statements: one for a name (text), one for a food (text), one for the number 2025 (no quotes needed for numbers).",
      expected:"(your name)\n(your fav food)\n2025"
    }
  },
  {
    id:2, emoji:"📦", title:"Variables", concept:"Storing Data",
    content:[
      {type:"text",text:"A <strong>variable</strong> is a named container for storing a value. You create one with a single = sign (called the assignment operator). The name goes on the left, the value on the right."},
      {type:"code",code:`name = "Jordan"\nage = 21\nheight = 5.9\n\nprint(name)\nprint(age)`,out:`Jordan\n21`},
      {type:"text",text:"Variable names can contain letters, numbers, and underscores, but <strong>cannot start with a number</strong>. They're case-sensitive: <strong>name</strong> and <strong>Name</strong> are different variables."},
      {type:"code",code:`# Good names\nmy_name = "Sam"\nfavoriteColor = "blue"\nscore1 = 100\n\n# This would crash:\n# 1score = 100  ← starts with number!`,out:""},
      {type:"text",text:"You can update a variable by reassigning it. The old value is replaced. You can also use a variable inside another expression."},
      {type:"code",code:`score = 50\nprint(score)   # 50\n\nscore = 75     # overwrite it\nprint(score)   # 75\n\nbonus = 10\nfinal = score + bonus\nprint(final)`,out:`50\n75\n85`},
    ],
    quizzes:[
      {q:"How do you store the value 100 in a variable called points?",opts:["100 = points","points == 100","points = 100","var points = 100"],ans:2,exp:"In Python, assignment is name = value. The variable name always goes on the left."},
      {q:"Which is a valid variable name?",opts:["2fast","my-score","first name","player_1"],ans:3,exp:"Variable names can use letters, numbers, and underscores. No spaces, hyphens, or starting with a digit."},
    ],
    challenge:{
      title:"Your profile",
      desc:"Create 3 variables:\n• name — your name as a string\n• age — your age as a number\n• fav_language — set it to \"Python\"\n\nThen print all three.",
      hint:"Use = to assign. Strings need quotes. Numbers don't.",
      starter:"# Create your 3 variables here\n\n# Then print them\n",
      task:"Create variables: name (string), age (integer), fav_language = 'Python'. Then print all three on separate lines.",
      expected:"(your name)\n(your age)\nPython"
    }
  },
  {
    id:3, emoji:"🔢", title:"Numbers & Math", concept:"Operators & Calculations",
    content:[
      {type:"text",text:"Python handles all the math you'd expect, plus a few extras. The basic operators are + - * / and there are two more powerful ones you'll use a lot."},
      {type:"code",code:`print(10 + 3)   # 13  - addition\nprint(10 - 3)   # 7   - subtraction\nprint(10 * 3)   # 30  - multiplication\nprint(10 / 3)   # 3.33 - division\nprint(10 // 3)  # 3   - floor division (no decimal)\nprint(10 % 3)   # 1   - modulo (remainder)\nprint(2 ** 8)   # 256 - power (2 to the 8th)`,out:`13\n7\n30\n3.3333333333333335\n3\n1\n256`},
      {type:"text",text:"Python has two number types: <strong>int</strong> (whole numbers like 5, 100) and <strong>float</strong> (decimals like 3.14, 99.9). Division always returns a float. You can store results in variables."},
      {type:"code",code:`price = 49.99\ntax_rate = 0.08\ntax = price * tax_rate\ntotal = price + tax\n\nprint(total)`,out:`53.9892`},
      {type:"text",text:"Python follows standard <strong>order of operations</strong> (PEMDAS). Use parentheses to control what runs first."},
      {type:"code",code:`print(2 + 3 * 4)    # 14, not 20\nprint((2 + 3) * 4)  # 20`,out:`14\n20`},

    quizzes:[

      {q:"What does 17 % 5 return?",opts:["3","2","1","0"],ans:1,exp:"% is modulo — it gives the remainder. 17 ÷ 5 = 3 remainder 2. So 17 % 5 = 2."},

    challenge:{

  {
    id:4, emoji:"✂️", title:"Strings", concept:"Text Manipulation",
    content:[
      {type:"text",text:"Strings are how Python handles text. You already know how to print them — now let's do more powerful things with them. Strings have built-in <strong>methods</strong> (functions that belong to the string)."},
      {type:"code",code:`msg = "hello world"\n\nprint(msg.upper())       # all caps\nprint(msg.lower())       # all lowercase\nprint(msg.capitalize())  # First letter cap\nprint(msg.title())       # Every Word Cap\nprint(len(msg))          # number of characters\nprint(msg.replace("world", "Python"))`,out:`HELLO WORLD\nhello world\nHello world\nHello World\n11\nhello Python`},

    quizzes:[

  {
    id:5, emoji:"💬", title:"User Input", concept:"Interactive Programs",
    content:[
      {type:"text",text:"So far your programs have used fixed data. With <strong>input()</strong> you can ask the user to type something. Whatever they type gets stored as a string."},

function isComplete(idx) {
  const p = S.progress[idx];
  return p && p.quizzes && p.quizzes[0] !== undefined && p.quizzes[1] !== undefined && p.challenge !== undefined;
}

function isUnlocked(idx) {
  return idx === 0 || isComplete(idx - 1);
}

function totalXP() {
  // 10 XP per quiz, 30 XP per challenge (only first time)
  let x = 0;
  for (const [k, p] of Object.entries(S.progress)) {
    if (p.quizzes) p.quizzes.forEach(q => { if (q !== undefined) x += 10; });
    if (p.challenge !== undefined) x += 30;
  }
  return x;
}

function lessonsComplete() {
  return LESSONS.filter((_,i) => isComplete(i)).length;
}

// ─────────────────────────────────────────────
//  SYNTAX HIGHLIGHT
// ─────────────────────────────────────────────
function hl(raw) {
  if (!raw) return "";
  const lines = raw.split("\n");
  return lines.map(line => {
    // Find comment start outside strings
    let inStr = false, sc = "", ci = -1;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (!inStr && (c==='"'||c==="'")) { inStr=true; sc=c; }
      else if (inStr && c===sc) { inStr=false; }
      else if (!inStr && c==="#") { ci=i; break; }
    }
    let code = ci>=0 ? line.slice(0,ci) : line;
    const comment = ci>=0 ? line.slice(ci) : "";

    code = code.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");

    // Protect strings — replace with placeholder that contains no digits
    const strs = [];
    code = code.replace(/("(?:[^"\\]|\\.)*"|'(?:[^'\\]|\\.)*')/g, m => {
      strs.push(m);
      return `\x01STR${strs.length-1}END\x01`;
    });

    // Keywords
    ["def","return","if","elif","else","for","while","in","and","or","not","break",
     "continue","pass","True","False","None","import","from","class","with","as","try","except",
     "print","input","len","range","int","float","str","append","remove","sort","type","round","abs"
    ].forEach(kw => {
      code = code.replace(new RegExp(`\\b(${kw})\\b`,"g"),
        `<span style="color:#7dd3fc">$1</span>`);
    });

    // Numbers — won't match inside STR...END placeholders
    code = code.replace(/\b(\d+\.?\d*)\b/g,
      `<span style="color:#f97316">$1</span>`);

    // Restore strings
    strs.forEach((s,i) => {
      code = code.replace(`\x01STR${i}END\x01`,
        `<span style="color:#fbbf24">${s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}</span>`);
    });

    const commentHtml = comment
      ? `<span style="color:#4b5563">${comment.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}</span>`
      : "";

    return code + commentHtml;
  }).join("\n");
}

function escHtml(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

// ─────────────────────────────────────────────
//  CONTENT RENDERER
// ─────────────────────────────────────────────
function renderBlock(b) {
  if (b.type === "text") {
    return `<p class="mb16">${b.text}</p>`;
  }
  if (b.type === "code") {
    const hasOut = b.out && b.out.trim();
    return `<div class="cblock">
      <div class="cblock-head">
        <span class="tag">Python</span>
        <span style="font-size:11px;color:#4b5563">code example</span>
      </div>
      <div class="cblock-code"><pre>${hl(b.code)}</pre></div>
      ${hasOut ? `<div class="cblock-out"><div style="font-size:10px;color:#4b5563;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px">Output</div><pre>${escHtml(b.out)}</pre></div>` : ""}
    </div>`;
  }
  return "";
}

        <button class="btn btn-outline" onclick="closeApiModal()">Cancel / Skip</button>
      </div>
    </div>
  </div>`;
}

    <button class="back" onclick="go('home')">‹</button>
    <div class="grow">
      <div class="tag">Lesson ${S.lessonIdx+1} of ${LESSONS.length}</div>

  <!-- Step indicator -->
  <div style="padding:12px 20px 0;text-align:center">
    <div class="dots">
      <span class="dot on" title="Read"></span>

function renderQuiz() {
  const l = LESSONS[S.lessonIdx];
  const quiz = l.quizzes[S.quizIdx];
  const p = S.progress[S.lessonIdx] || {};

  const opts = quiz.opts.map((o,i) => {
    let cls = "";
    if (S.quizDone) {
      if (i === quiz.ans) cls = "ok";
      else if (i === S.quizSel) cls = "bad";
    } else if (i === S.quizSel) cls = "sel";
    return `<button class="qopt ${cls}" onclick="${!S.quizDone?"selQuiz("+i+")":""}">
      <span class="qletter">${String.fromCharCode(65+i)}</span>
      <span>${escHtml(o)}</span>
    </button>`;
  }).join("");

  const qText = escHtml(quiz.q).replace(/\n/g,"<br>");

  return `
  <div class="nav">
    <button class="back" onclick="go('reading',${S.lessonIdx})">‹</button>
    <div class="grow">
      <div class="tag">Lesson ${S.lessonIdx+1} · Quiz ${S.quizIdx+1} of 2</div>
      <div style="font-size:15px;font-weight:700">Test Your Knowledge</div>
    </div>
    <span class="badge-g">+10 XP</span>
  </div>

  <div class="pad" style="padding-bottom:80px">
    <!-- Step dots -->
    <div class="dots mb16" style="justify-content:flex-start">
      <span class="dot ${p.quizzes&&p.quizzes[0]!==undefined?"done":"on"}"></span>
      <span class="dot ${S.quizIdx>=1?'on':''}"></span>
      <span class="dot"></span>
    </div>

    <div class="card card-blue mb16">
      <div class="tag mb8">Question ${S.quizIdx+1}</div>
      <div style="font-size:14px;line-height:1.7;color:var(--t2)">${qText}</div>
    </div>

    <div style="margin-bottom:16px">${opts}</div>

    ${S.quizDone ? `
      <div class="feedback ${S.quizSel===quiz.ans?"card-green":"card-red"}">
        <strong>${S.quizSel===quiz.ans?"✅ Correct!":"❌ Not quite"}</strong>
        <span style="color:${S.quizSel===quiz.ans?"#6ee7b7":"#fca5a5"}">${quiz.exp}</span>
      </div>
      <button class="btn btn-g mt12" onclick="nextAfterQuiz()">
        ${S.quizIdx===0 ? "Next Question →" : "Go to Challenge →"}
      </button>
    ` : `
      <button class="btn btn-g" onclick="submitQuiz()" ${S.quizSel===null?"disabled":""}>
        Submit Answer
      </button>
    `}
  </div>`;
}

function renderChallenge() {
  const l = LESSONS[S.lessonIdx];
  const ch = l.challenge;
  const p = S.progress[S.lessonIdx] || {};
  const done = p.challenge !== undefined;

  const hasRun = S.output !== null || S.runError !== null;

  const outputHtml = hasRun ? `
    <div class="cblock mt12">
      <div class="cblock-head">
        <span class="tag">Output</span>
        <span style="font-size:11px;color:${S.runError?"#ef4444":"#4b5563"}">${S.runError ? "⚠ error" : "✓ ran"}</span>
      </div>
      ${S.output ? `<div class="cblock-out"><pre>${escHtml(S.output)}</pre></div>` : ""}
      ${S.runError ? `<div style="background:#1c0a0a;border:1px solid #ef444433;padding:10px 14px;border-top:none">
        <pre style="font-family:var(--font);font-size:12px;color:#ef4444;white-space:pre-wrap;margin:0">${escHtml(S.runError)}</pre>
      </div>` : ""}
    </div>` : "";

  return `
  <div class="nav">
    <button class="back" onclick="go('reading',${S.lessonIdx})">‹</button>
    <div class="grow">
      <div class="tag">Lesson ${S.lessonIdx+1} · Code Challenge</div>
      <div style="font-size:15px;font-weight:700">✍️ ${ch.title}</div>
    </div>
  </div>

  <div class="pad" style="padding-bottom:80px">
    <div class="card card-blue mb16">
      <div class="tag mb8">Your Task</div>
      <div style="font-size:13px;color:#7dd3fc;line-height:1.75;white-space:pre-wrap">${escHtml(ch.desc)}</div>
    </div>

    <button class="btn btn-outline btn-sm mb12" onclick="toggleHint()">
      ${S.hintShown?"🙈 Hide Hint":"💡 Show Hint"}
    </button>
    <div class="hint ${S.hintShown?"shown":""}" id="hintBox">
      <div class="tag mb8">Hint</div>
      <pre style="font-family:var(--font);font-size:12px;white-space:pre-wrap;color:#7dd3fc">${escHtml(ch.hint)}</pre>
    </div>

    <div class="tag mb8 mt12">Your Code</div>
    <textarea class="editor" id="codeEditor" placeholder="Write your Python here..." oninput="updateCode(this.value)">${escHtml(S.code || ch.starter)}</textarea>

    ${outputHtml}

    <div class="stack mt12">
      <button class="btn btn-g" onclick="checkCode()">▶ Run Code</button>

        `<button class="btn btn-outline" onclick="go('reading',${S.lessonIdx+1})">Next Lesson →</button>` : ""}

  const xp = totalXP();
  return `<div style="padding:60px 20px;text-align:center">
    <div style="font-size:64px;margin-bottom:16px">🏆</div>
    <h1 style="background:linear-gradient(135deg,#fff,var(--g));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px">
      You did it!
    </h1>
    <p class="mb20">All 10 Python lessons complete. You earned <strong style="color:var(--g)">${xp} XP</strong>.</p>
    <div class="card card-green mb16">
      <div style="font-size:14px;color:#6ee7b7;line-height:1.8">
        You now know:<br>
        lingo · print · variables · math<br>
        strings · input · if/elif/else<br>
        lists · for loops · while loops · functions
      </div>
    </div>
    <p class="muted mb20">What's next? Try building a small project — a quiz game, a to-do list, or a number guessing game using everything you learned!</p>

// ─────────────────────────────────────────────
//  NAVIGATION
// ─────────────────────────────────────────────
function go(screen, lessonIdx, quizIdx) {
  S.screen = screen;
  if (lessonIdx !== undefined) S.lessonIdx = lessonIdx;
  if (quizIdx !== undefined) {
    S.quizIdx = quizIdx;
    S.quizSel = null;
    S.quizDone = false;
  }
  if (screen === "challenge") {
    S.code = LESSONS[S.lessonIdx].challenge.starter;
    S.output = null;
    S.runError = null;
    S.hintShown = false;
  }
  render();
  window.scrollTo(0, 0);
}

// ─────────────────────────────────────────────
//  QUIZ LOGIC
// ─────────────────────────────────────────────
function selQuiz(i) {
  if (S.quizDone) return;
  S.quizSel = i;
  render();
}

function submitQuiz() {
  if (S.quizSel === null) return;
  S.quizDone = true;
  const correct = S.quizSel === LESSONS[S.lessonIdx].quizzes[S.quizIdx].ans;

  // Save progress
  if (!S.progress[S.lessonIdx]) S.progress[S.lessonIdx] = {};
  if (!S.progress[S.lessonIdx].quizzes) S.progress[S.lessonIdx].quizzes = [];
  S.progress[S.lessonIdx].quizzes[S.quizIdx] = correct;
  save();
  render();
}

function nextAfterQuiz() {
  if (S.quizIdx === 0) {
    // Go to quiz 2
    S.quizIdx = 1;
    S.quizSel = null;
    S.quizDone = false;
  } else {
    // Go to challenge
    go("challenge", S.lessonIdx);
  }
  render();
  window.scrollTo(0, 0);
}

// ─────────────────────────────────────────────
//  CHALLENGE LOGIC
// ─────────────────────────────────────────────
function updateCode(val) {
  S.code = val;
  S.output = null;
  S.runError = null;
}

function toggleHint() {
  S.hintShown = !S.hintShown;
  render();
}

// ─────────────────────────────────────────────
//  MINI PYTHON RUNNER
// ─────────────────────────────────────────────
function runPython(code) {
  const output = [];
  const errors = [];

  // Block anything dangerous
  const banned = ["fetch","XMLHttpRequest","eval","Function(","import ","__import__","exec(","open(","os.","sys.","subprocess"];
  for (const b of banned) {
    if (code.includes(b)) return { ok: false, output: [], error: `'${b}' is not supported in this runner.` };
  }

  // ── Translate Python → JS ──────────────────
  let js = code;

  // Remove type annotations e.g. x: int = 5
  js = js.replace(/(\w+)\s*:\s*\w+\s*=/g, "$1 =");

  // Comments
  js = js.replace(/#[^\n]*/g, "");

  // Booleans & None
  js = js.replace(/\bTrue\b/g, "true").replace(/\bFalse\b/g, "false").replace(/\bNone\b/g, "null");

  // and / or / not
  js = js.replace(/\band\b/g, "&&").replace(/\bor\b/g, "||").replace(/\bnot\b/g, "!");

  // f-strings: f"..." or f'...'
  js = js.replace(/f"((?:[^"\\]|\\.)*)"/g, (_, s) => '`' + s.replace(/\{/g,'${') + '`');
  js = js.replace(/f'((?:[^'\\]|\\.)*)'/g, (_, s) => '`' + s.replace(/\{/g,'${') + '`');

  // print(...) — handle end= keyword
  js = js.replace(/print\(([^)]*),\s*end\s*=\s*["']([^"']*)["']\)/g, (_, args, end) => {
    return `__print__(${args}, {end: ${JSON.stringify(end)}})`;
  });
  js = js.replace(/print\(([^)]*)\)/g, "__print__($1)");

  // input() — return empty string (can't prompt in runner)
  js = js.replace(/input\([^)]*\)/g, '""');

  // Python string methods
  js = js.replace(/\.upper\(\)/g, ".toUpperCase()");
  js = js.replace(/\.lower\(\)/g, ".toLowerCase()");
  js = js.replace(/\.strip\(\)/g, ".trim()");
  js = js.replace(/\.capitalize\(\)/g, ".replace(/^./, c => c.toUpperCase())");
  js = js.replace(/\.title\(\)/g, ".replace(/\\b\\w/g, c => c.toUpperCase())");
  js = js.replace(/\.replace\(/g, ".replace(");

  // len()
  js = js.replace(/\blen\(([^)]+)\)/g, "($1).length");

  // range()
  js = js.replace(/\brange\(([^)]+)\)/g, (_, args) => {
    const parts = args.split(",").map(s => s.trim());
    if (parts.length === 1) return `__range__(0, ${parts[0]}, 1)`;
    if (parts.length === 2) return `__range__(${parts[0]}, ${parts[1]}, 1)`;
    return `__range__(${parts[0]}, ${parts[1]}, ${parts[2]})`;
  });

  // List append / remove / sort
  js = js.replace(/\.append\(/g, ".push(");
  js = js.replace(/(\w+)\.sort\(\)/g, "$1.sort()");
  js = js.replace(/(\w+)\.remove\(([^)]+)\)/g, (_, list, val) =>
    `${list}.splice(${list}.indexOf(${val}), 1)`);

  // int() float() str()
  js = js.replace(/\bint\(([^)]+)\)/g, "Math.trunc(Number($1))");
  js = js.replace(/\bfloat\(([^)]+)\)/g, "Number($1)");
  js = js.replace(/\bstr\(([^)]+)\)/g, "String($1)");
  js = js.replace(/\babs\(([^)]+)\)/g, "Math.abs($1)");
  js = js.replace(/\bround\(([^)]+)\)/g, "Math.round($1)");

  // Python list display: convert JS arrays to Python-style strings for print
  // ** / floor division / modulo already work in JS

  // Python ** power operator
  js = js.replace(/(\w[\w.]*|\)|\d)\s*\*\*\s*(\w[\w.]*|\(|\d)/g, "Math.pow($1,$2)");

  // Floor division //
  js = js.replace(/\/\//g, "/~~FLOORDIV~~");
  js = js.replace(/(\S+)\s*\/~~FLOORDIV~~\s*(\S+)/g, "Math.floor($1 / $2)");

  // elif → else if, Python colons → JS braces (indentation-based)
  js = convertBlocks(js);

  // ── Execute ────────────────────────────────
  let printBuf = "";

  function __range__(start, stop, step) {
    const result = [];
    if (step > 0) { for (let i = start; i < stop; i += step) result.push(i); }
    else { for (let i = start; i > stop; i += step) result.push(i); }
    return result;
  }

  function pyRepr(val) {
    if (Array.isArray(val)) return "[" + val.map(pyRepr).join(", ") + "]";
    if (typeof val === "string") return "'" + val + "'";
    if (val === true) return "True";
    if (val === false) return "False";
    if (val === null) return "None";
    return String(val);
  }

  function __print__(...args) {
    let end = "\n", items = [];
    // check last arg for options object
    if (args.length > 0 && typeof args[args.length-1] === "object" && args[args.length-1] !== null && !Array.isArray(args[args.length-1]) && "end" in args[args.length-1]) {
      const opts = args.pop();
      end = opts.end;
    }
    for (const a of args) {
      if (Array.isArray(a)) items.push("[" + a.map(pyRepr).join(", ") + "]");
      else if (a === true) items.push("True");
      else if (a === false) items.push("False");
      else if (a === null) items.push("None");
      else items.push(String(a));
    }
    printBuf += items.join(" ") + end;
  }

  try {
    new Function("__print__", "__range__", js)(__print__, __range__);
    return { ok: true, output: printBuf.trimEnd() };
  } catch(e) {
    // Give friendly error messages
    let msg = e.message;
    if (msg.includes("is not defined")) {
      const name = msg.match(/(\w+) is not defined/)?.[1];
      msg = `NameError: '${name}' is not defined. Did you forget to create this variable first?`;
    } else if (msg.includes("is not a function")) {
      msg = `TypeError: You're calling something as a function that isn't one. Check your parentheses.`;
    } else if (msg.includes("Unexpected token")) {
      msg = `SyntaxError: Something looks off — check for missing quotes, colons, or parentheses.`;
    } else if (msg.includes("Cannot read prop")) {
      msg = `TypeError: Tried to use a value that doesn't exist yet. Check your variable names.`;
    }
    return { ok: false, output: printBuf.trimEnd(), error: msg };
  }
}

// ── Convert indentation blocks to JS braces ─
function convertBlocks(code) {
  const lines = code.split("\n");
  const out = [];
  const indentStack = [0];

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];
    const trimmed = line.trimEnd();
    if (!trimmed) { out.push(""); continue; }

    const indent = line.match(/^(\s*)/)[1].length;
    const content = trimmed.trim();

    // Close blocks for dedent
    while (indent < indentStack[indentStack.length - 1]) {
      out.push(" ".repeat(indentStack[indentStack.length - 2] || 0) + "}");
      indentStack.pop();
    }

    // Translate keywords that open blocks
    let jsLine = content;

    // for x in list:
    jsLine = jsLine.replace(/^for\s+(\w+)\s+in\s+(.+):$/, (_, v, iterable) =>
      `for (const ${v} of ${iterable}) {`);

    // while condition:
    jsLine = jsLine.replace(/^while\s+(.+):$/, (_, cond) => `while (${cond}) {`);

    // if condition:
    jsLine = jsLine.replace(/^if\s+(.+):$/, (_, cond) => `if (${cond}) {`);

    // elif condition:
    jsLine = jsLine.replace(/^elif\s+(.+):$/, (_, cond) => `} else if (${cond}) {`);

    // else:
    jsLine = jsLine.replace(/^else:$/, "} else {");

    // def name(args):
    jsLine = jsLine.replace(/^def\s+(\w+)\s*\((.*)\)\s*:$/, (_, name, args) =>
      `function ${name}(${args}) {`);

    // pass → nothing
    jsLine = jsLine.replace(/^pass$/, "");

    const opensBlock = jsLine.trimEnd().endsWith("{");

    out.push(" ".repeat(indent) + jsLine);

    if (opensBlock) {
      indentStack.push(indent + 4);
    }
  }

  // Close any remaining open blocks
  while (indentStack.length > 1) {
    out.push("}");
    indentStack.pop();
  }

  return out.join("\n");
}

// ─────────────────────────────────────────────
function checkCode() {
  const code = S.code.trim();
  if (!code || code === LESSONS[S.lessonIdx].challenge.starter.trim()) {
    S.output = null;
    S.runError = "Write some code first!";
    render();
    return;
  }

  const result = runPython(code);

  // Mark as attempted regardless
  if (!S.progress[S.lessonIdx]) S.progress[S.lessonIdx] = {};
  if (!S.progress[S.lessonIdx].quizzes) S.progress[S.lessonIdx].quizzes = [];
  S.progress[S.lessonIdx].challenge = "ran";
  save();

  S.output = result.output || null;
  S.runError = result.ok ? null : result.error;
  render();
}

// ─────────────────────────────────────────────
//  API KEY MODAL
// ─────────────────────────────────────────────
function showApiSetup() {
  document.getElementById("apiModal").style.display = "block";
}

function closeApiModal() {
  document.getElementById("apiModal").style.display = "none";
}

function saveApiKey() {
  const key = document.getElementById("apiKeyInput").value.trim();
  S.apiKey = key;
  save();
  closeApiModal();
  render();
}

// ─────────────────────────────────────────────
//  MAIN RENDER
// ─────────────────────────────────────────────
function render() {
  const app = document.getElementById("app");
  switch(S.screen) {
    case "home":      app.innerHTML = renderHome(); break;
    case "reading":   app.innerHTML = renderReading(); break;
    case "quiz":      app.innerHTML = renderQuiz(); break;
    case "challenge": app.innerHTML = renderChallenge(); break;
    case "done":      app.innerHTML = renderDone(); break;
  }
}

render();
</script>
